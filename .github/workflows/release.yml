name: Build And Package Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter dependencies
        working-directory: gated
        run: flutter pub get

      - name: Build Flutter web release
        working-directory: gated
        run: flutter build web --release --dart-define=API_BASE_URL=/api

      - name: Backend dependencies
        working-directory: gated/backend
        run: dart pub get

      - name: Build release package
        run: |
          bash deploy/build_release_package.sh "${RELEASE_TAG}"

      - name: Upload package as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: gated-release-${{ env.RELEASE_TAG }}
          path: |
            .release-dist/gated-release.tar.gz
            .release-dist/gated-release.tar.gz.sha256
          if-no-files-found: error

      - name: Upload package to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            .release-dist/gated-release.tar.gz \
            .release-dist/gated-release.tar.gz.sha256 \
            --clobber
