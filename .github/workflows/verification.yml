name: Manual Verification

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API base URL used for the web build
        required: false
        default: /api

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  API_BASE_URL: ${{ inputs.api_base_url || '/api' }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter dependencies
        working-directory: gated
        run: flutter pub get

      - name: Flutter format check
        working-directory: gated
        run: dart format --output=none --set-exit-if-changed lib

      - name: Flutter analyze
        working-directory: gated
        run: flutter analyze

      - name: Flutter tests
        working-directory: gated
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No Flutter tests found. Skipping."
          fi

      - name: Flutter web build
        working-directory: gated
        run: flutter build web --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Backend dependencies
        working-directory: gated/backend
        run: dart pub get

      - name: Backend format check
        working-directory: gated/backend
        run: dart format --output=none --set-exit-if-changed .

      - name: Backend analyze
        working-directory: gated/backend
        run: dart analyze

      - name: Backend tests
        working-directory: gated/backend
        run: |
          if [ -d "test" ]; then
            dart test
          else
            echo "No backend tests found. Skipping."
          fi
