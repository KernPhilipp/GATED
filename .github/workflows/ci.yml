name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter dependencies
        working-directory: gated
        run: flutter pub get

      - name: Flutter analyze
        working-directory: gated
        run: flutter analyze lib

      - name: Flutter tests
        working-directory: gated
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No Flutter tests found. Skipping."
          fi

      - name: Backend dependencies
        working-directory: gated/backend
        run: dart pub get

      - name: Backend analyze
        working-directory: gated/backend
        run: dart analyze

      - name: Backend tests
        working-directory: gated/backend
        run: |
          if [ -d "test" ]; then
            dart test
          else
            echo "No backend tests found. Skipping."
          fi
